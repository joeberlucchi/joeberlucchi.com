<style>
  html, body { margin: 0; padding: 0; background: #0e0e10; overflow-x: hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: "DM Sans", system-ui, sans-serif;
    color: #ece4d4;
    -webkit-text-size-adjust: 100%;
    text-rendering: optimizeLegibility;
  }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: #26262a; border-radius: 5px; }
  ::-webkit-scrollbar-track { background: #0e0e10; }
  html { scroll-behavior: smooth; }
  a { color: inherit; }
  img { max-width: 100%; height: auto; display: block; }

  /* Visible focus ring for keyboard navigation */
  a:focus-visible, button:focus-visible {
    outline: 2px solid #cae92f;
    outline-offset: 3px;
    border-radius: 2px;
  }

  /* Skip link for screen readers / keyboard users */
  .skip-link {
    position: absolute;
    left: -9999px;
    top: 8px;
    background: #cae92f;
    color: #0e0e10;
    padding: 8px 14px;
    border-radius: 4px;
    font-weight: 600;
    z-index: 100;
  }
  .skip-link:focus { left: 8px; }

  /* Touch-friendly nav targets */
  .nav-link { padding: 10px 6px; text-decoration: none; min-height: 44px; display: inline-flex; align-items: center; }
  .cta-link { min-height: 44px; display: inline-flex; align-items: center; }

  /* Tablet & phone: wrap section nav to its own row, stack grids, shrink padding */
  @media (max-width: 820px) {
    .nav-secondary {
      order: 99 !important;
      flex-basis: 100% !important;
      justify-content: center !important;
      gap: 4px !important;
      flex-wrap: wrap !important;
      padding-top: 4px;
    }
    .nav-secondary .nav-link { font-size: 13px; padding: 8px 8px; }
    .skills-row { grid-template-columns: 1fr !important; gap: 6px !important; text-align: center; }
    .contact-grid { grid-template-columns: 1fr !important; }
    .contact-cell { border-right: none !important; border-bottom: 1px solid #26262a !important; }
    .contact-cell:last-child { border-bottom: none !important; }
    .meta-grid { gap: 20px !important; justify-content: center; }
    .footer-meta { flex-direction: column !important; gap: 8px; align-items: center; text-align: center; }
  }

  @media (max-width: 480px) {
    .nav-secondary { gap: 2px !important; }
    .nav-secondary .nav-link { font-size: 12px; padding: 8px 6px; }
    .meta-grid { flex-direction: column; align-items: center; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
