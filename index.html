<style>
  html, body { margin: 0; padding: 0; background: #0e0e10; overflow-x: clip; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: "DM Sans", system-ui, sans-serif;
    color: #ece4d4;
    -webkit-text-size-adjust: 100%;
    text-rendering: optimizeLegibility;
  }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: #26262a; border-radius: 5px; }
  ::-webkit-scrollbar-track { background: #0e0e10; }
  html { scroll-behavior: smooth; scroll-padding-top: 72px; }
  @media (max-width: 820px) { html { scroll-padding-top: 110px; } }
  a { color: inherit; }
  img { max-width: 100%; height: auto; display: block; }

  /* Visible focus ring for keyboard navigation */
  a:focus-visible, button:focus-visible {
    outline: 2px solid #cae92f;
    outline-offset: 3px;
    border-radius: 2px;
  }

  /* Skip link for screen readers / keyboard users */
  .skip-link {
    position: absolute;
    left: -9999px;
    top: 8px;
    background: #cae92f;
    color: #0e0e10;
    padding: 8px 14px;
    border-radius: 4px;
    font-weight: 600;
    z-index: 100;
  }
  .skip-link:focus { left: 8px; }

  /* Touch-friendly nav targets */
  .nav-link { padding: 10px 6px; text-decoration: none; min-height: 44px; display: inline-flex; align-items: center; }
  .cta-link { min-height: 44px; display: inline-flex; align-items: center; }

  /* Desktop: show full CTA label, hide short one */
  .cta-short { display: none; }

  /* Tablet & phone: brand centered on row 1, all nav links + CTA wrapped on row 2 */
  @media (max-width: 820px) {
    .header-bar {
      row-gap: 8px !important;
      padding-top: 12px !important;
      padding-bottom: 10px !important;
    }
    .brand {
      flex-basis: 100% !important;
      justify-content: center !important;
      order: 0 !important;
      padding-bottom: 0 !important;
    }
    .nav-spacer { display: none !important; }
    .nav-secondary {
      order: 99 !important;
      flex-basis: 100% !important;
      justify-content: center !important;
      align-items: center !important;
      gap: clamp(2px, 1vw, 6px) !important;
      flex-wrap: wrap !important;
      padding-top: 0 !important;
      width: 100%;
    }
    .nav-secondary .nav-link {
      font-size: clamp(12px, 3.4vw, 15px) !important;
      padding: 6px clamp(6px, 2vw, 10px) !important;
      white-space: nowrap !important;
      min-height: 32px !important;
      border-right: 1px solid #3a3a40;
    }
    .nav-secondary .nav-link:last-of-type { border-right: none; }

    /* CTA pinned to top-right of brand row; brand stays centered */
    .header-bar > .cta-link {
      position: absolute !important;
      top: 12px !important;
      right: clamp(12px, 4vw, 24px) !important;
      margin-left: 0 !important;
      font-size: clamp(11px, 3vw, 14px) !important;
      padding: 6px 12px !important;
      min-height: 30px !important;
      white-space: nowrap !important;
      z-index: 2;
    }
    .cta-full { display: none !important; }
    .cta-short { display: inline !important; }
    .skills-row { grid-template-columns: 1fr !important; gap: 6px !important; text-align: center; }
    .contact-grid { grid-template-columns: 1fr !important; }
    .contact-cell { border-right: none !important; border-bottom: 1px solid #26262a !important; }
    .contact-cell:last-child { border-bottom: none !important; }
    .meta-grid { gap: 20px !important; justify-content: center; }
    .footer-meta { flex-direction: column !important; gap: 8px; align-items: center; text-align: center; }
  }

  @media (max-width: 480px) {
    .nav-secondary { gap: clamp(1px, 0.6vw, 4px) !important; }
    .nav-secondary .nav-link { padding: 6px 5px !important; font-size: clamp(11px, 3.2vw, 14px) !important; }
    .header-bar > .cta-link { padding: 5px 10px !important; right: 10px !important; top: 10px !important; }
    .meta-grid { flex-direction: column; align-items: center; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
